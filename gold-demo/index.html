<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Portfolio</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-8 py-6 bg-white shadow">
<h1 class="text-xl font-bold">Royal Wedding Films</h1>

<div class="space-x-6">
<a href="#">Home</a>
<a href="#">Portfolio</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="h-[70vh] flex items-center justify-center text-center bg-black text-white">
<div>
<h1 class="text-5xl font-bold mb-6">Cinematic Wedding Photography</h1>
<p class="mb-6 text-gray-300">Capturing timeless wedding memories</p>
<button class="bg-pink-600 px-6 py-3 rounded">Check Portfolio</button>
</div>
</section>

<!-- PORTFOLIO -->
<section class="max-w-6xl mx-auto py-20 px-6">

<h2 class="text-3xl font-bold mb-10 text-center">Wedding Portfolio</h2>

<div class="grid md:grid-cols-3 gap-6">

<img src="https://images.unsplash.com/photo-1507504031003-b417219a0fde" class="rounded-lg">
<img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf" class="rounded-lg">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552" class="rounded-lg">
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486" class="rounded-lg">
<img src="https://images.unsplash.com/photo-1537633552985-df8429e8048b" class="rounded-lg">
<img src="https://images.unsplash.com/photo-1509927083803-4bd519298ac4" class="rounded-lg">

</div>
</section>

<!-- SERVICES -->
<section class="bg-white py-20">

<h2 class="text-3xl font-bold text-center mb-12">Photography Services</h2>

<div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-8 text-center">

<div class="p-6 shadow rounded">
<h3 class="text-xl font-semibold mb-3">Wedding Shoot</h3>
<p>Full day wedding coverage</p>
</div>

<div class="p-6 shadow rounded">
<h3 class="text-xl font-semibold mb-3">Pre Wedding</h3>
<p>Cinematic couple shoots</p>
</div>

<div class="p-6 shadow rounded">
<h3 class="text-xl font-semibold mb-3">Engagement</h3>
<p>Engagement photography</p>
</div>

</div>
</section>

<!-- CONTACT FORM -->
<section class="py-20 text-center">

<h2 class="text-3xl font-bold mb-8">Book Your Date</h2>

<form class="max-w-md mx-auto space-y-4">

<input class="w-full border p-3 rounded" placeholder="Name">
<input class="w-full border p-3 rounded" placeholder="Phone">
<input class="w-full border p-3 rounded" placeholder="Wedding Date">

<button class="bg-pink-600 text-white px-6 py-3 rounded w-full">
Send Enquiry
</button>

</form>

</section>

</body>
</html>
