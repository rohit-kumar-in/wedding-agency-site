<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Photography</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-800">

<!-- NAVBAR -->
<nav class="flex justify-between items-center p-6 shadow">
<h1 class="text-xl font-bold">Dream Wedding Studio</h1>
<a href="#" class="bg-pink-600 text-white px-4 py-2 rounded">WhatsApp</a>
</nav>

<!-- HERO -->
<section class="text-center py-20 bg-gray-100">
<h2 class="text-4xl font-bold mb-4">Capturing Your Beautiful Moments</h2>
<p class="text-gray-600 mb-6">Wedding & Engagement Photography</p>
<button class="bg-pink-600 text-white px-6 py-3 rounded">Book Now</button>
</section>

<!-- ABOUT -->
<section class="max-w-5xl mx-auto py-16 px-6">
<h3 class="text-2xl font-semibold mb-4">About Photographer</h3>
<p>Professional wedding photographer capturing timeless love stories.</p>
</section>

<!-- GALLERY -->
<section class="max-w-6xl mx-auto py-16 grid grid-cols-2 md:grid-cols-4 gap-4 px-6">
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486" class="rounded">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552" class="rounded">
<img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf" class="rounded">
<img src="https://images.unsplash.com/photo-1507504031003-b417219a0fde" class="rounded">
</section>

<!-- CONTACT -->
<section class="text-center py-16 bg-gray-100">
<h3 class="text-2xl font-semibold mb-4">Book Your Wedding Shoot</h3>
<button class="bg-green-500 text-white px-6 py-3 rounded">Chat on WhatsApp</button>
</section>

<footer class="text-center py-6 text-gray-500">
© 2026 Dream Wedding Studio
</footer>

</body>
</html>
